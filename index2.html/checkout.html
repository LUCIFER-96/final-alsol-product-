<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Watch Pro ultra</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  background: #f7f7f7;
  color: #111;
}

header {
  background: white;
  padding: 20px;
  border-bottom: 1px solid #eee;
  text-align: center;
  font-weight: 600;
}

.container {
  max-width: 1100px;
  margin: 50px auto;
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
  padding: 0 20px;
}

.form-section {
  flex: 1;
  min-width: 300px;
}

h2 {
  margin-bottom: 20px;
}

.form-group {
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
}

input:focus {
  outline: none;
  border-color: black;
}

.summary {
  width: 350px;
  background: white;
  padding: 25px;
  border-radius: 20px;
  height: fit-content;
}

.summary h3 {
  margin-bottom: 20px;
}

.product {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.total {
  border-top: 1px solid #eee;
  margin-top: 15px;
  padding-top: 15px;
  font-weight: bold;
}

.btn {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  border: none;
  background: black;
  color: white;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s;
}

  .btn {
  padding: 12px 25px;
  background: black;
  color: white;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  transition: all 0.4s ease;
  position: relative;
  overflow: hidden;
}

.btn:hover {
  transform: translateY(-3px) scale(1.03);
  box-shadow: 0 12px 30px rgba(0,0,0,0.25);
}



.radio-group {
  margin-top: 10px;
}

.radio-group label {
  display: block;
  margin-bottom: 8px;
  font-size: 14px;
}

@media(max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .summary {
    width: 100%;
  }
}
</style>
</head>

<body>

<header>
  <div class="nav">
    <a href="index2.html" style="text-decoration: bold; color: #000000; font-family: -apple-system, BlinkMacSystemFont, sans-serif;">Watches&Co.</a>
  </div>
</header>

<div class="container">

  <div class="form-section">
    <h2>Shipping Information</h2>

    <div class="form-group">
      <input type="text" placeholder="Full Name">
    </div>

    <div class="form-group">
      <input type="email" placeholder="Email Address">
    </div>

    <div class="form-group">
      <input type="text" placeholder="Address">
    </div>

    <div class="form-group">
      <input type="text" placeholder="City">
    </div>

    <div class="form-group">
      <input type="text" placeholder="Postal Code">
    </div>

    <div class="form-group">
      <select>
        <option>India</option>
        <option>USA</option>
        <option>UK</option>
      </select>
    </div>

    <h2>Payment Method</h2>

    <div class="radio-group">
      <label><input type="radio" name="payment"> Credit / Debit Card</label>
      <label><input type="radio" name="payment"> UPI</label>
      <label><input type="radio" name="payment"> Cash on Delivery</label>
    </div>

    <button class="btn">Complete Order</button>
  </div>

  
  <div class="summary">
    <h3>Order Summary</h3>

    <div class="product">
      <span>SmartWatch Pro</span>
      <span>₹999</span>
    </div>

    <div class="product">
      <span>Shipping</span>
      <span>Free</span>
    </div>

    <div class="total">
      <span>Total: ₹999</span>
    </div>
  </div>

</div>

</body>
</html>
